[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "enumendpoint"
version = "7.0.1"
description = "Website endpoint scanner and rate limit tester that bypasses simple captchas."
readme = "README.md"
dependencies = [
    "curl_cffi",
    "beautifulsoup4",
    "playwright",
    "playwright-stealth"
]

[project.scripts]
# pyprojectthing
enumendpoint = "enumerateendpoint:main"
