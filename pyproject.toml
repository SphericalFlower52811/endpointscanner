[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "endpointscanner"
version = "7.0.2"
readme = "README.md"
description = "Website endpoint scanner and rate limit tester that bypasses simple captchas."
requires-python = ">=3.9"
dependencies = [
    "curl_cffi",
    "beautifulsoup4",
    "playwright",
    "playwright-stealth"
]

[project.scripts]
# pyprojectthing
endpointscanner = "enumerateendpoint:main"
