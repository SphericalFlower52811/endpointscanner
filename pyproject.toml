[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "enumendpoint"
version = "6.0"
dependencies = [
    "curl_cffi",
    "beautifulsoup4",
    "playwright",
    "playwright-stealth"
]

[project.scripts]
# This creates the terminal command 'enumendpoint'
# format: command_name = "filename_without_extension:function_name"
enumendpoint = "enumerateendpoint:main"
