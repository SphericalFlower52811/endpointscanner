name: Build Debian Package

on:
  release:
    types: [published]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Debian Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dh-python python3-all python3-setuptools
          pip install stdeb

      - name: Compile and Build Python Distribution Artifacts
        run: |
          python3 -m pip install --upgrade pip build
          python3 -m build

      - name: Convert Project Files into Native Debian Format
        run: |
          cat << 'EOF' > setup.py
          from setuptools import setup
          setup()
          EOF
          python3 setup.py --command-packages=stdeb.command bdist_deb

      - name: Relocate Compiled Debian Packages for Release Upload
        run: |
          mkdir dist-deb
          cp deb_dist/*.deb dist-deb/

      - name: Upload Debian Archive to Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist-deb/*.deb
