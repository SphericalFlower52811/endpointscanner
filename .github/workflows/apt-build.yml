name: Build Debian Package

on:
  release:
    types: [published]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Debian Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dh-python python3-all

      - name: Create Package Directories
        run: |
          mkdir -p debian/source
          mkdir -p debian/endpointscanner/usr/bin

      - name: Generate Debian Control Metadata
        run: |
          cat << 'EOF' > debian/control
          Source: endpointscanner
          Section: utils
          Priority: optional
          Maintainer: SphericalFlower52811 <endpointscanner@gmail.com>
          Build-Depends: debhelper-compat (= 13), python3-all, dh-python
          Standards-Version: 4.6.2

          Package: endpointscanner
          Architecture: all
          Depends: python3, python3-pip, ${misc:Depends}
          Description: Website endpoint recon tool and rate limit tester.
           Advanced web reconnaissance tool and JS crawler utilizing high-fidelity
           TLS/JA3 impersonation and dynamic headless client-side parsing.
          EOF

      - name: Configure Debian Build Compatibility
        run: echo "13" > debian/compat

      - name: Configure Build Rules
        run: |
          echo '#!/usr/bin/make -f' > debian/rules
          echo '%:' >> debian/rules
          printf "\tdh \$@ --with python3\n" >> debian/rules
          chmod +x debian/rules

      - name: Format Debian Changelog
        run: |
          cat << 'EOF' > debian/changelog
          endpointscanner (7.3.1-1) unstable; urgency=low
            * Release version 7.3.1 build template.
           -- SphericalFlower52811 <endpointscanner@gmail.com>  Tue, 23 Jun 2026 00:00:00 +0000
          EOF

      - name: Build Binary Debian Package Archive
        run: dpkg-buildpackage -us -uc -b

      - name: Upload Debian Archive to Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ../*.deb
