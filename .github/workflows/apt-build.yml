name: Build Debian Package

on:
  release:
    types: [published]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install System Packaging Prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm

      - name: Compile and Build Python Artifacts
        run: |
          python3 -m pip install --upgrade pip build
          python3 -m build

      - name: Convert Source Code to Flawless Debian Package
        run: |
          fpm -s python -t deb \
            --name "endpointscanner" \
            --version "7.3.1" \
            --iteration "1" \
            --architecture "all" \
            --description "Website endpoint reconnaissance tool and rate limit tester that can bypass simple captchas and WAFs." \
            --maintainer "SphericalFlower52811 <endpointscanner@gmail.com>" \
            --license "MIT" \
            dist/endpointscanner-7.3.1-py3-none-any.whl

      - name: Relocate Package for Release Upload
        run: |
          mkdir dist-deb
          cp *.deb dist-deb/

      - name: Upload Debian Archive to Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist-deb/*.deb
